shell = "zsh"
apply = ["defer"]

[templates]
defer = "{{ hooks?.pre | nl }}{% for file in files %}zsh-defer source \"{{ file }}\"\n{% endfor %}{{ hooks?.post | nl }}"
# source = "{{ hooks?.pre | nl }}{% for file in files %}source \"{{ file }}\"\n{% endfor %}{{ hooks?.post | nl }}"

# zsh-defer（最初に読み込み、他のプラグインの defer に必要）
[plugins.zsh-defer]
github = "romkatv/zsh-defer"
apply = ["source"]

# zsh-completions（fpath 追加、compinit 前に必要）
[plugins.zsh-completions]
github = "zsh-users/zsh-completions"

# compinit
[plugins.compinit]
inline = '''
autoload -Uz compinit && zsh-defer compinit
'''

# starship（プロンプト）
[plugins.starship]
inline = '''
zsh-defer -c 'eval "$(starship init zsh)"'
'''

# dotfiles 設定
[plugins.dotfiles-defer]
local = "@configHome@/zsh/sheldon-config"
use = ["*.zsh"]

# direnv（遅延）
[plugins.direnv]
inline = '''
zsh-defer -c 'eval "$(direnv hook zsh)"'
'''

# fzf（遅延）
[plugins.fzf]
inline = 'zsh-defer -c "source <(fzf --zsh)"'

# zoxide（遅延）
[plugins.zoxide]
inline = '''
zsh-defer -c 'eval "$(zoxide init zsh)"'
'''

# 10. zsh-autosuggestions
[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"
