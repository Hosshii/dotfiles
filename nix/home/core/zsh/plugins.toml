shell = "zsh"
apply = ["defer"]

[templates]
defer = "{{ hooks?.pre | nl }}{% for file in files %}zsh-defer source \"{{ file }}\"\n{% endfor %}{{ hooks?.post | nl }}"
# source = "{{ hooks?.pre | nl }}{% for file in files %}source \"{{ file }}\"\n{% endfor %}{{ hooks?.post | nl }}"

# zsh-defer（最初に読み込み、他のプラグインの defer に必要）
[plugins.zsh-defer]
github = "romkatv/zsh-defer"
apply = ["source"]

# zsh-completions（fpath 追加、compinit 前に必要）
[plugins.zsh-completions]
github = "zsh-users/zsh-completions"

# compinit
[plugins.compinit]
inline = '''
autoload -Uz compinit && zsh-defer compinit
# if [[ -n $(find "${ZDOTDIR:-$HOME}/.zcompdump" -mtime +1 2>/dev/null) ]] || [[ ! -f "${ZDOTDIR:-$HOME}/.zcompdump" ]]; then
#   zsh-defer compinit
# else
#   zsh-defer compinit
# fi
'''
apply = ["source"]

# starship（プロンプト）
[plugins.starship]
inline = 'eval "$(starship init zsh)"'

# dotfiles 設定
[plugins.dotfiles-defer]
local = "@configHome@/zsh/sheldon-config"
use = ["*.zsh"]

# fzf（遅延）
[plugins.fzf]
inline = 'zsh-defer -c "source <(fzf --zsh)"'
apply = ["source"]

# zoxide（遅延）
[plugins.zoxide]
inline = 'zsh-defer -c "eval \"$(zoxide init zsh)\""'
apply = ["source"]

# 10. zsh-autosuggestions
[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"
